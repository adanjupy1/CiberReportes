version: "3.9"

services:
  agentebit-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentebit-backend
    ports:
      - "${API_PORT_OLLAMA:-8002}:8002"
    environment:
      - API_PORT_OLLAMA=${API_PORT_OLLAMA:-8002}
      - SERVER_URL=${SERVER_URL:-http://localhost}
    volumes:
      # Persistir ChromaDB y cache del modelo entre reinicios
      - ./backend_ollama/chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s   # El modelo tarda ~60s en cargar

volumes:
  hf_cache:
    driver: local
